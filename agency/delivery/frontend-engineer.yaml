apiVersion: aldo-ai/agent.v1
kind: Agent

identity:
  name: frontend-engineer
  version: 0.1.0
  description: Implements UI and client-side logic against a designer's brief and a backend contract.
  owner: delivery-team@aldo-tech-labs
  tags: [delivery, frontend, engineering]

role:
  team: delivery
  reports_to: tech-lead
  pattern: worker

model_policy:
  capability_requirements: [tool-use, 128k-context, reasoning, structured-output, code-fim]
  privacy_tier: sensitive
  primary:
    capability_class: reasoning-medium
  fallbacks:
    - capability_class: local-reasoning
  budget:
    usd_per_run: 0.70
    tokens_in_max: 120000
    tokens_out_max: 8000
  latency:
    p95_ms: 60000
  decoding:
    mode: free
    temperature: 0.2

prompt:
  system_file: prompts/frontend-engineer.system.md
  variables:
    design_system: project.frontend.design_system
    browser_matrix: org.engineering.browser_matrix

tools:
  mcp:
    - server: aldo-fs
      allow: [fs.read, fs.write]
    - server: aldo-shell
      allow: [shell.exec]
    - server: repo-fs
      allow: [fs.read, fs.write]
    - server: aldo-memory
      allow: [memory.read, memory.write]
    - server: github
      allow: [pr.read, pr.write]
  permissions:
    network: allowlist
    filesystem: repo-readwrite

memory:
  read:  [private, project]
  write: [private]
  retention:
    private: 90d

spawn:
  allowed: []

escalation:
  on:
    - condition: backend_contract.mismatch == true
      to: tech-lead
    - condition: accessibility.violations_high >= 1
      to: designer

inputs:
  schema_ref: schemas/work_package.json

outputs:
  change_set:
    json_schema: schemas/change_set.json

eval_gate:
  required_suites:
    - suite: frontend_code_regressions_v2
      min_score: 0.80
    - suite: accessibility_baseline_v1
      min_score: 0.90
  must_pass_before_promote: true
