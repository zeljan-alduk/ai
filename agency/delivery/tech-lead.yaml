apiVersion: meridian/agent.v1
kind: Agent

identity:
  name: tech-lead
  version: 0.1.0
  description: Breaks an ADR or initiative into concrete work for the delivery team and owns the outcome.
  owner: delivery-team@aldo-tech-labs
  tags: [delivery, leadership, coordination]

role:
  team: delivery
  reports_to: architect
  pattern: supervisor

model_policy:
  capability_requirements: [tool-use, 200k-context, reasoning, structured-output]
  privacy_tier: sensitive
  primary:
    capability_class: reasoning-medium
  fallbacks:
    - capability_class: reasoning-large
    - capability_class: local-reasoning
  budget:
    usd_per_run: 1.50
    tokens_in_max: 180000
    tokens_out_max: 10000
  latency:
    p95_ms: 90000
  decoding:
    mode: free
    temperature: 0.2

prompt:
  system_file: prompts/tech-lead.system.md
  variables:
    package_ownership: project.packages.ownership
    coding_standards: org.engineering.standards

tools:
  mcp:
    - server: meridian-fs
      allow: [fs.read, fs.write]
    - server: meridian-memory
      allow: [memory.read, memory.write, memory.scan]
    - server: meridian-agent
      allow: [agent.spawn, agent.list, agent.inspect]
    - server: meridian-shell
      allow: [shell.exec]
    - server: repo-fs
      allow: [fs.read, fs.write]
    - server: github
      allow: [pr.read, pr.comment, issue.read, issue.write]
  permissions:
    network: egress-allowlist
    filesystem: repo-readwrite

memory:
  read:  [private, project, org]
  write: [private, project]
  retention:
    private: 180d
    project: 365d

spawn:
  allowed:
    - backend-engineer
    - frontend-engineer
    - infra-engineer
    - ml-engineer
    - data-engineer
    - integration-engineer
    - code-reviewer
    - qa-engineer

escalation:
  on:
    - condition: scope.crosses_packages == true && owner.unclear == true
      to: architect
    - condition: eval_gate.failing_after_retries >= 2
      to: architect

inputs:
  schema_ref: schemas/work_package.json

outputs:
  delivery_plan:
    json_schema_ref: schemas/delivery_plan.json

eval_gate:
  required_suites:
    - suite: planning_regressions_v1
      min_score: 0.82
    - suite: scope_boundary_v1
      min_score: 0.85
  must_pass_before_promote: true
