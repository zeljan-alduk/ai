apiVersion: aldo-ai/agent.v1
kind: Agent

identity:
  name: data-engineer
  version: 0.1.0
  description: Owns pipelines, schemas, and the trustworthiness of data the rest of the org reads.
  owner: delivery-team@aldo-tech-labs
  tags: [delivery, data, engineering]

role:
  team: delivery
  reports_to: tech-lead
  pattern: worker

model_policy:
  capability_requirements: [tool-use, 128k-context, reasoning, structured-output]
  privacy_tier: sensitive
  primary:
    capability_class: reasoning-medium
  fallbacks:
    - capability_class: local-reasoning
  budget:
    usd_per_run: 0.70
    tokens_in_max: 120000
    tokens_out_max: 6000
  latency:
    p95_ms: 60000
  decoding:
    mode: free
    temperature: 0.15

prompt:
  system_file: prompts/data-engineer.system.md
  variables:
    warehouse_schemas: project.data.warehouse
    pii_policy: org.privacy.pii_policy

tools:
  mcp:
    - server: aldo-fs
      allow: [fs.read, fs.write]
    - server: aldo-shell
      allow: [shell.exec]
    - server: repo-fs
      allow: [fs.read, fs.write]
    - server: aldo-memory
      allow: [memory.read, memory.write]
  permissions:
    network: egress-allowlist
    filesystem: repo-readwrite

memory:
  read:  [private, project]
  write: [private]
  retention:
    private: 180d

spawn:
  allowed: []

escalation:
  on:
    - condition: schema_change.breaking == true
      to: tech-lead
    - condition: pii.new_field_detected == true
      to: legal-compliance

inputs:
  schema_ref: schemas/work_package.json

outputs:
  change_set:
    json_schema_ref: schemas/change_set.json

eval_gate:
  required_suites:
    - suite: data_pipeline_regressions_v1
      min_score: 0.85
    - suite: schema_compat_v1
      min_score: 0.95
  must_pass_before_promote: true
