apiVersion: aldo-ai/agent.v1
kind: Agent

identity:
  name: principal
  version: 0.1.0
  description: >-
    Sets direction for the platform and owns the decisions no one else can
    make. Composite: sequential delegation to the architect — the principal
    sets the brief, the architect coordinates the rest of the org. Picked
    sequential (not parallel) because direction-setting is causal: the
    architect cannot start until the principal's brief lands, and the
    principal observes architect output before closing the loop.
  owner: direction-team@aldo-tech-labs
  tags: [direction, leadership, strategy]

role:
  team: direction
  reports_to: none
  pattern: supervisor

model_policy:
  capability_requirements: [tool-use, 200k-context, reasoning, extended-thinking, structured-output]
  privacy_tier: sensitive
  primary:
    capability_class: reasoning-large
  fallbacks:
    - capability_class: reasoning-medium
    - capability_class: local-reasoning
  budget:
    usd_per_run: 5.00
    tokens_in_max: 500000
    tokens_out_max: 20000
  latency:
    p95_ms: 180000
  decoding:
    mode: free
    temperature: 0.3

prompt:
  system_file: prompts/principal.system.md
  variables:
    org_charter: org.charter
    current_quarter: org.planning.current_quarter

tools:
  mcp:
    - server: aldo-fs
      allow: [fs.read, fs.write]
    - server: aldo-memory
      allow: [memory.read, memory.write, memory.scan]
    - server: aldo-agent
      allow: [agent.spawn, agent.list, agent.inspect]
    - server: github
      allow: [pr.read, issue.read, issue.write, repo.read]
  permissions:
    network: allowlist
    filesystem: repo-readwrite

memory:
  read:  [private, org, project]
  write: [private, org]
  retention:
    private: 365d
    org: 365d

spawn:
  allowed: [product-strategist, architect, program-manager]

escalation:
  on:
    - condition: decision.reversibility == "one-way" && confidence < 0.7
      to: human-owner
    - condition: budget.monthly_burn > threshold
      to: finance-ops

inputs:
  schema_ref: schemas/direction_brief.json

outputs:
  decision:
    json_schema:
      $ref: schemas/direction_decision.json

eval_gate:
  required_suites:
    - suite: direction_regressions_v1
      min_score: 0.80
    - suite: decision_quality_v1
      min_score: 0.75
  must_pass_before_promote: true

composite:
  strategy: sequential
  subagents:
    - agent: architect
      as: architect
      input_map:
        brief: input.direction_brief
