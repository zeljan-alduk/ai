apiVersion: aldo/models.v1
kind: ModelCatalog

# Seed catalogue used by the router during development and tests.
# Prices reflect public list rates as of 2026-04 — treat as illustrative;
# real deployments override via their own catalog file.

models:
  # --- Anthropic --------------------------------------------------------
  - id: claude-opus-4-7
    provider: anthropic
    providerKind: anthropic
    locality: cloud
    capabilityClass: reasoning-large
    provides:
      - 200k-context
      - tool-use
      - function-calling
      - parallel-tool-calls
      - streaming
      - reasoning
      - extended-thinking
      - vision
      - long-output
      - structured-output
    privacyAllowed: [public, internal]
    effectiveContextTokens: 200000
    latencyP95Ms: 4500
    cost:
      usdPerMtokIn: 15.0
      usdPerMtokOut: 75.0
      usdPerMtokCacheRead: 1.5
      usdPerMtokCacheWrite: 18.75
    providerConfig:
      apiKeyEnv: ANTHROPIC_API_KEY

  - id: claude-sonnet-4-6
    provider: anthropic
    providerKind: anthropic
    locality: cloud
    capabilityClass: reasoning-medium
    provides:
      - 200k-context
      - tool-use
      - function-calling
      - parallel-tool-calls
      - streaming
      - reasoning
      - extended-thinking
      - vision
      - structured-output
    privacyAllowed: [public, internal]
    effectiveContextTokens: 200000
    latencyP95Ms: 2500
    cost:
      usdPerMtokIn: 3.0
      usdPerMtokOut: 15.0
      usdPerMtokCacheRead: 0.3
      usdPerMtokCacheWrite: 3.75
    providerConfig:
      apiKeyEnv: ANTHROPIC_API_KEY

