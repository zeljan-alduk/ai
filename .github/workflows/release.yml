name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  cli-binary:
    name: Build aldo CLI binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
          - os: macos-latest
            target: darwin-arm64
            bun_target: bun-darwin-arm64
          - os: windows-latest
            target: windows-x64
            bun_target: bun-windows-x64

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build CLI binary
        shell: bash
        working-directory: apps/cli
        run: |
          mkdir -p dist
          bun build ./src/index.ts \
            --compile \
            --target=${{ matrix.bun_target }} \
            --outfile "dist/aldo-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}"

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: apps/cli/dist/aldo-${{ matrix.target }}*
          fail_on_unmatched_files: false

