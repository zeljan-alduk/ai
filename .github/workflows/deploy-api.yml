name: Deploy API to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'platform/api-contract/**'
      - 'platform/registry/**'
      - 'platform/storage/**'
      - 'platform/types/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: fly deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ vars.DEPLOY_API_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      # Stage runtime secrets so `flyctl deploy` rolls them out atomically
      # with the new image. `--stage` queues them without forcing a release.
      # The @aldo-ai/secrets package refuses to boot in production without
      # ALDO_SECRETS_MASTER_KEY (32-byte base64 NaCl secretbox key).
      # Wave 10 added ALDO_JWT_SECRET (32-byte base64 HS256 key) — the auth
      # module refuses to boot in production without it.
      - name: Stage Fly secrets
        run: |
          flyctl secrets set --stage --app aldo-ai-api \
            ALDO_SECRETS_MASTER_KEY="${{ secrets.ALDO_SECRETS_MASTER_KEY }}" \
            ALDO_JWT_SECRET="${{ secrets.ALDO_JWT_SECRET }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: |
          flyctl deploy \
            --remote-only \
            --config apps/api/fly.toml \
            --dockerfile apps/api/Dockerfile \
            --app aldo-ai-api \
            --ignorefile apps/api/.dockerignore \
            --build-arg COMMIT_SHA=${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
