name: Release TypeScript SDK

# Manual-trigger only — never publishes on plain pushes. Mirrors the
# release-python-sdk.yml pattern. The maintainer bumps the version
# in `sdks/typescript/package.json`, runs this workflow with
# `dry_run=false`, and the job publishes to npm.
#
# `dry_run=true` (the default) builds + tests + does a `--dry-run`
# `pnpm publish` so we can see exactly what would have been uploaded
# without flipping the bit. Use it before the real release.
#
# Real publish (`dry_run=false`) requires the `confirm` input to
# equal the package version exactly — guards against accidental
# flips of the dry_run dropdown.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + test + dry-run publish (does NOT push to npm)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      confirm:
        description: 'Must equal package.json version (e.g. 0.1.0) when dry_run=false. Leave blank for dry-runs.'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  # Required when authenticating to npm via GitHub OIDC. Even with a
  # plain token we read it from secrets, but `id-token: write` is
  # cheap to keep here so we can switch to provenance later.
  id-token: write

jobs:
  release:
    name: Build, test, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          # Use the public npm registry. `npm publish` reads
          # NODE_AUTH_TOKEN from env (set on the publish step).
          registry-url: 'https://registry.npmjs.org'
          scope: '@aldo-ai'

      - name: Install workspace deps
        # The TS SDK declares dev deps locally; full workspace install
        # is the simplest way to keep the lockfile authoritative.
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      # Quality gate — typecheck + unit tests + production build.
      - name: typecheck
        run: pnpm exec tsc --noEmit

      - name: tests
        run: pnpm exec vitest run

      - name: build
        run: pnpm exec tsc -p tsconfig.json

      - name: Resolve version
        id: ver
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "@aldo-ai/sdk version: ${PKG_VERSION}"

      # `confirm` must equal the version string to allow a real publish.
      # Dry-runs ignore `confirm` entirely.
      - name: Guard real publish with confirm == version
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          if [ "${{ inputs.confirm }}" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::Real publish requires inputs.confirm to equal the package version."
            echo "::error::Got confirm='${{ inputs.confirm }}', expected '${{ steps.ver.outputs.version }}'."
            echo "::error::Re-run with confirm=${{ steps.ver.outputs.version }} to proceed, or flip dry_run back to true."
            exit 1
          fi
          echo "Confirmed: publishing @aldo-ai/sdk@${{ steps.ver.outputs.version }} to real npm."

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run == 'true' }}
        run: pnpm publish --access public --no-git-checks --dry-run

      # Snapshot what's in the artefact so the workflow log is a
      # complete paper trail even when no token is configured.
      - name: Publish summary
        run: |
          {
            echo "## TypeScript SDK release dry-run"
            echo ""
            echo "- **Package**: @aldo-ai/sdk"
            echo "- **Version**: ${{ steps.ver.outputs.version }}"
            echo "- **License**: FSL-1.1-ALv2"
            echo "- **Mode**: ${{ inputs.dry_run == 'true' && 'dry-run (npm registry, --dry-run)' || 'REAL (npm publish)' }}"
            echo "- **Target**: https://registry.npmjs.org/"
            echo ""
            echo "### Build artefacts"
            echo '```'
            ls -lh dist/ | head -25
            echo '```'
            echo ""
            echo "### Pack contents (pnpm pack --dry)"
            echo '```'
            pnpm pack --pack-destination /tmp 2>&1 | tail -45 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish (real)
        if: ${{ inputs.dry_run == 'false' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_PUBLISH_TOKEN secret is not configured on this repo."
            exit 1
          fi
          pnpm publish --access public --no-git-checks
