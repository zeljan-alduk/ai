name: Release Python SDK

# Manual-trigger only — never publishes on plain pushes. The maintainer
# bumps `sdks/python/pyproject.toml`'s version + `__version__`, runs
# this workflow with `dry_run=false`, and the job publishes to PyPI.
#
# A `dry_run=true` run goes through every gate but uploads to TestPyPI
# instead. Use it before the real release.
#
# Real publish (`dry_run=false`) requires the `confirm` input to equal
# the package version exactly — guards against accidental flips.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Upload to TestPyPI instead of PyPI'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      confirm:
        description: 'Must equal pyproject.toml version (e.g. 0.1.0) when dry_run=false. Leave blank for dry-runs.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Build, test, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # Quality gate — every check from sdks/python/PUBLISHING.md.
      - name: pytest
        run: python -m pytest -q

      - name: mypy
        run: python -m mypy src/aldo_ai

      - name: ruff
        run: python -m ruff check src/aldo_ai

      # Confirm the package version matches the tag-style intent before
      # we waste a build minute on a misnumbered release.
      - name: Resolve version
        id: ver
        run: |
          PKG_VERSION=$(python -c "import aldo_ai; print(aldo_ai.__version__)")
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "aldo-ai version: ${PKG_VERSION}"

      # `confirm` must equal the version string to allow a real publish.
      # Dry-runs ignore `confirm` entirely.
      - name: Guard real publish with confirm == version
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          if [ "${{ inputs.confirm }}" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::Real publish requires inputs.confirm to equal the package version."
            echo "::error::Got confirm='${{ inputs.confirm }}', expected '${{ steps.ver.outputs.version }}'."
            echo "::error::Re-run with confirm=${{ steps.ver.outputs.version }} to proceed, or flip dry_run back to true."
            exit 1
          fi
          echo "Confirmed: publishing aldo-ai==${{ steps.ver.outputs.version }} to real PyPI."

      - name: Build sdist + wheel
        run: |
          python -m pip install build
          python -m build

      - name: twine check
        run: python -m twine check dist/*

      # Snapshot what's in the artefacts so the workflow log is a
      # complete paper trail even when no tokens are configured.
      - name: Publish summary
        run: |
          {
            echo "## Python SDK release dry-run"
            echo ""
            echo "- **Package**: aldo-ai"
            echo "- **Version**: ${{ steps.ver.outputs.version }}"
            echo "- **License**: FSL-1.1-ALv2"
            echo "- **Mode**: ${{ inputs.dry_run == 'true' && 'dry-run (TestPyPI)' || 'REAL (PyPI)' }}"
            echo "- **Target**: ${{ inputs.dry_run == 'true' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}"
            echo ""
            echo "### Artefacts"
            echo '```'
            ls -lh dist/
            echo '```'
            echo ""
            echo "### Wheel contents (top 30 entries)"
            echo '```'
            unzip -l dist/*.whl | head -35
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload (TestPyPI)
        if: ${{ inputs.dry_run == 'true' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "::warning::TEST_PYPI_API_TOKEN secret is not configured. Skipping TestPyPI upload."
            echo "::warning::Build + twine-check still validated the artefacts. Configure the secret to do a true TestPyPI dry-run."
            exit 0
          fi
          python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Upload (PyPI)
        if: ${{ inputs.dry_run == 'false' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "::error::PYPI_API_TOKEN secret is not configured on this repo."
            exit 1
          fi
          python -m twine upload dist/*
