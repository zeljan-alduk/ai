{{/*
  Privacy-tier enforcement at the network layer.

  CLAUDE.md non-negotiable #3: a pod marked `privacy_tier: sensitive`
  must be physically incapable of reaching a cloud model. The router
  drops it, not the agent author. This NetworkPolicy backstops the
  router by closing the egress door at the kernel level.

  Allowed egress from sensitive pods:
    - kube-dns (UDP/53, TCP/53)         — DNS resolution
    - in-cluster Postgres (TCP/5432)    — checkpointer + registry
    - in-cluster api  (TCP/8080)        — control-plane events
    - in-cluster web  (TCP/8080)        — UI server-side fetches
    - operator-supplied CIDRs           — for VPC-local local-LLM gateways

  Deny by default for everything else (cloud-model APIs, public internet,
  metadata services, etc.).

  Requires a CNI that enforces NetworkPolicy (Calico, Cilium, Antrea,
  Weave, or AKS/EKS/GKE with network policy enabled).
*/}}
{{- if .Values.privacyTier.enforced -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aldo-ai.fullname" . }}-sensitive-egress
  labels:
    {{- include "aldo-ai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml .Values.privacyTier.sensitivePodLabels | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # DNS to kube-dns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # In-cluster Postgres
    - to:
        - podSelector:
            matchLabels:
              {{- include "aldo-ai.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432

    # In-cluster api
    - to:
        - podSelector:
            matchLabels:
              {{- include "aldo-ai.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080

    # In-cluster web
    - to:
        - podSelector:
            matchLabels:
              {{- include "aldo-ai.componentSelectorLabels" (dict "root" . "component" "web") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080

    {{- with .Values.privacyTier.allowedEgressCIDRs }}
    # Operator-supplied egress allowlist (e.g. internal Ollama gateway).
    - to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
    {{- end }}
{{- end }}
