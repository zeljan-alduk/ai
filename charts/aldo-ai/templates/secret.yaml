{{/*
  Placeholder Secret rendered ONLY when secrets.bringYourOwnSecret is false.
  Strongly discouraged for production — values land in the Helm release
  manifest. Use --set or sealed-secrets / external-secrets-operator to keep
  these out of state in real deployments.
*/}}
{{- if not .Values.secrets.bringYourOwnSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aldo-ai.appSecretName" . }}
  labels:
    {{- include "aldo-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.values }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
