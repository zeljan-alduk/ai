{{/*
  Bundled-Postgres password Secret. Created on first install with a
  random 32-char password and then preserved across upgrades via the
  helm.sh/resource-policy: keep annotation — losing this secret would
  orphan the database files in the PVC.

  Skipped entirely when:
    - postgres.enabled: false (BYO managed Postgres)
    - postgres.passwordSecret.create: false (operator pre-creates the secret)
*/}}
{{- if and .Values.postgres.enabled .Values.postgres.passwordSecret.create -}}
{{- $secretName := include "aldo-ai.postgresPasswordSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if $existing -}}
{{- $password = index $existing.data .Values.postgres.passwordSecret.key | b64dec -}}
{{- else -}}
{{- $password = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "aldo-ai.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ .Values.postgres.passwordSecret.key }}: {{ $password | quote }}
{{- end }}
