apiVersion: aldo-ai/agent.v1
kind: Agent

# Trimmed sensitive-tier agent for `aldo agents check` tests. No real
# MCP/tool wiring — we only exercise the routing simulation against a
# fixture catalog. Mirrors the privacy_tier=sensitive shape from
# agency/support/security-auditor.yaml without that file's
# json_schema_ref outputs (which the wave-7.5 schema doesn't accept).
identity:
  name: security-reviewer
  version: 0.1.0
  description: Sensitive-tier reviewer used in CLI dry-run tests.
  owner: support-team@aldo-tech-labs
  tags: [support, security, test]

role:
  team: support
  pattern: worker

model_policy:
  capability_requirements: [tool-use, structured-output]
  privacy_tier: sensitive
  primary:
    capability_class: reasoning-medium
  fallbacks:
    - capability_class: local-reasoning
  budget:
    usd_per_run: 1.00
    tokens_in_max: 8000
    tokens_out_max: 1000
  decoding:
    mode: free
    temperature: 0.1

prompt:
  system_file: prompts/security-reviewer.system.md

tools:
  mcp: []
  native: []
  permissions:
    network: none
    filesystem: repo-readonly

memory:
  read: [private, project]
  write: [private]

spawn:
  allowed: []

escalation: []

subscriptions: []

eval_gate:
  required_suites: []
  must_pass_before_promote: false
