apiVersion: meridian/agent.v1
kind: Agent

# Trimmed copy of agency/support/code-reviewer.yaml: no MCP entries, no
# native tools — used by run-command tests so the engine's tool path stays
# dormant. (See: don't-add-a-real-MCP-client-yet, in CLAUDE.md.)
identity:
  name: code-reviewer
  version: 0.1.0
  description: Reviews diffs for correctness, style, and security smells.
  owner: support-team@meridian-labs
  tags: [support, review]

role:
  team: support
  pattern: worker

model_policy:
  capability_requirements: [tool-use, streaming, structured-output]
  privacy_tier: internal
  primary:
    capability_class: reasoning-medium
  fallbacks:
    - capability_class: fast-draft
  budget:
    usd_per_run: 0.50
    tokens_in_max: 8000
    tokens_out_max: 1000
  decoding:
    mode: free
    temperature: 0.2

prompt:
  system_file: prompts/code-reviewer.system.md

tools:
  mcp: []
  native: []
  permissions:
    network: none
    filesystem: repo-readonly

memory:
  read: [private, project]
  write: [private]
  retention:
    private: 30d

spawn:
  allowed: []

escalation: []

subscriptions: []

eval_gate:
  required_suites: []
  must_pass_before_promote: false
