apiVersion: aldo-ai/agent.v1
kind: Agent
identity:
  name: sample-engineer
  version: 0.1.0
  description: Test fixture for the gallery fork endpoint.
  owner: delivery@gallery-test
  tags: [fixture, delivery]
role:
  team: delivery
  pattern: worker
model_policy:
  capability_requirements: [reasoning]
  privacy_tier: internal
  primary:
    capability_class: reasoning-medium
  fallbacks: []
  budget:
    usd_per_run: 0.5
  decoding:
    mode: free
prompt:
  system_file: prompts/sample.md
tools:
  mcp: []
  native: []
  permissions:
    network: none
    filesystem: none
memory:
  read: []
  write: []
  retention: {}
spawn:
  allowed: []
escalation: []
subscriptions: []
eval_gate:
  required_suites: []
  must_pass_before_promote: false
